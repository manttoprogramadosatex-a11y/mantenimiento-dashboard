<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Satex Master Project 2026</title>
    <script>
        // Generamos el timestamp una sola vez para evitar problemas de caché
        const v = new Date().getTime(); 
        document.write(`<link rel="stylesheet" href="estilos.css?v=${v}">`);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100vh; background-color: #2f5577; overflow: hidden; }
        #main-content { display: flex; flex-direction: column; height: calc(100vh - 105px); }
        #cardas-grid { height: 155px !important; flex-shrink: 0; display: flex; overflow-x: auto; padding: 2px 10px; background: rgba(0,0,0,0.1); gap: 5px; }
        #mantenimiento-container { flex-grow: 1; position: relative; }

        #maquinas-paradas-scroll, #accidentes-scroll {
            overflow-y: auto;
            max-height: 100%;
        }

        #accidentes-scroll::-webkit-scrollbar { width: 5px; }
        #accidentes-scroll::-webkit-scrollbar-thumb { background: #ff9999; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="header-container"></div>
    <div id="estatus-container"></div>

    <div id="main-content">
        <div id="cardas-grid"></div>
        <div id="mantenimiento-container"></div>
    </div>

    <script>
        // 1. LISTADO DE TODAS LAS LIBRERÍAS (Incluyendo las nuevas de autenticación)
        const libs = [
            // Autenticación primero para que estén disponibles
            "lib_satex_users_bridge.js",
            "lib_satex_auth_design.js",
            "lib_satex_auth_engine.js",
            // Diseño y Datos
            "lib_header_design.js",
            "lib_estatus_design.js",
            "lib_estatus_data.js",
            "lib_maquinas_inactivas.js",
            "lib_cardas_design.js",
            "lib_cardas_engine.js",
            "lib_mantenimiento.js",
            "lib_preventivo_design.js",
            "lib_personal_mantto_design.js",
            "lib_personal_vacaciones_bridge.js",
            "lib_personal_roll_bridge.js",
            "lib_personal_faltas_bridge.js",
            "lib_personal_negativos_bridge.js",
            "lib_compras_pendientes_design.js",
            "lib_compras_sheet_bridge.js",
            "lib_espera_llegada_bridge.js",
            "lib_pmc_donas_design.js",
            "lib_correctivo_kpi_design.js",
            "lib_correctivo_indicadores_engine.js",
            "lib_pmc_sheet_bridge.js",
            "lib_accidentes.js",
            "lib_accidentes_engine.js",
            "lib_data_loader.js",
            "lib_data_bridge.js"
        ];

        // 2. CARGA DINÁMICA CORRECTA (Aquí corregimos el error del ${v})
        libs.forEach(lib => {
            document.write(`<script src="${lib}?v=${v}"><\/script>`);
        });
    </script>

    <script>
        /* 🔒 FUNCIÓN PRINCIPAL 
           Se encarga de renderizar todo el tablero.
        */
        window.satexStartApp = async () => {
            console.log("Iniciando Tablero Satex...");

            SatexHeaderDesign.render("header-container");
            SatexEstatusDesign.render("estatus-container");
            SatexMantenimiento.render("mantenimiento-container");

            SatexAccidentesEngine.inicializar();

            SatexMaquinasInactivas.render("maquinas-paradas-scroll", [
                {tipo:"CARDA", num:"02", desde:"2025/02/26", dias:""},
                {tipo:"CARDA", num:"08", desde:"2026/02/20", dias:""},
                {tipo:"CONERA", num:"04", desde:"2026/02/27", dias:""},
                {tipo:"CONTINUA", num:"12", desde:"2026/02/28", dias:""},
                {tipo:"CARDA", num:"05", desde:"2026/02/15", dias:""}
            ]);

            await SatexEstatusData.actualizarDesdeSheet();

            // Intervalo de actualización de estatus
            setInterval(async () => {
                await SatexEstatusData.actualizarDesdeSheet();
            }, 15000);

            SatexCardasEngine.dibujar("cardas-grid");

            // Datos PMC
            const pmc = await SatexPMCSheetBridge.obtenerDatos();
            SatexPMCDonasDesign.render(
                "pmc-diario-container",
                "pmc-mensual-container",
                pmc.diario,
                pmc.maxDiario,
                pmc.mensual,
                pmc.maxMensual
            );

            setInterval(async () => {
                const pmcActualizado = await SatexPMCSheetBridge.obtenerDatos();
                SatexPMCDonasDesign.render(
                    "pmc-diario-container",
                    "pmc-mensual-container",
                    pmcActualizado.diario,
                    pmcActualizado.maxDiario,
                    pmcActualizado.mensual,
                    pmcActualizado.maxMensual
                );
            }, 120000);

            // KPIs y Preventivos
            SatexCorrectivoKPIDesign.render("kpis-correctivo-container", 125, 4, 18);
            await SatexCorrectivoIndicadoresEngine.init();

            const cumplimientoPreventivo = await SatexDataBridge.obtenerCumplimientoPreventivo();
            SatexPreventivoDesign.render("preventivos-grafico-container", cumplimientoPreventivo);

            // Personal y Compras
            const valFaltas = await SatexPersonalFaltasBridge.obtenerMaxColumnaA();
            const valNegativos = await SatexPersonalNegativosBridge.obtenerMaxColumnaA();
            SatexPersonalManttoDesign.render("personal-mantto-scroll", valFaltas, valNegativos);
            
            const maxPendientes = await SatexComprasSheetBridge.obtenerMaxColumnaA();
            const maxEspera = await SatexEsperaLlegadaBridge.obtenerMaxColumnaA();
            SatexComprasPendientesDesign.render("compras-pendientes-scroll", maxPendientes, maxEspera);
        };

        // 3. DISPARADOR AUTOMÁTICO O POR AUTENTICACIÓN
        window.onload = async () => {
            /* Si tu 'lib_satex_auth_engine.js' ya muestra un formulario de login, 
               deja que el engine llame a satexStartApp().
               
               Si quieres probar el tablero DE INMEDIATO como antes, 
               descomenta la siguiente línea:
            */
            // window.satexStartApp(); 
        };
    </script>

</body>
</html>
