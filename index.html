<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satex Textil - Tablero Master Mantenimiento</title>
    
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="style_layout.css">
    
    <script src="lib_header_design.js"></script>
    <script src="lib_header.js"></script>
    <script src="lib_estatus_design.js"></script>
    <script src="lib_estatus_data.js"></script>
    <script src="lib_estatus.js"></script>
    <script src="lib_cardas_design.js"></script>
    <script src="lib_cardas_engine.js"></script>
    <script src="lib_cardas.js"></script>
    <script src="lib_pmc_donas_design.js"></script>
    <script src="lib_correctivo_kpi_design.js"></script>
    <script src="lib_preventivo_design.js"></script>
    <script src="lib_preventivo_calendar.js"></script>
    <script src="lib_mantenimiento.js"></script>
    <script src="lib_personal_mantto_design.js"></script>
    <script src="lib_compras_pendientes_design.js"></script>
    <script src="lib_accidentes_engine.js"></script>
    <script src="lib_accidentes.js"></script>
    <script src="lib_maquinas_inactivas.js"></script>
    <script src="lib_maquinas_paradas.js"></script>
    
    <script src="lib_data_loader.js"></script>

    <script src="lib_data_bridge.js"></script>

</head>
<body>
    <div id="main-container">
        </div>

    <script>
        window.onload = async function() {
            // --- INICIALIZACIÓN DE COMPONENTES ---
            
            // Header
            SatexHeaderDesign.render("header-container");
            
            // Estatus Planta
            SatexEstatusDesign.render("estatus-container");
            
            // Cardas
            SatexCardasDesign.render("cardas-container");
            
            // Mantenimiento Correctivo
            SatexPMCDonasDesign.render("pmc-diario-container", "pmc-mensual-container", 11, 13, 280, 370);
            SatexCorrectivoKPIDesign.render("kpis-correctivo-container", 125, 4, 18);
            
            // Mantenimiento Preventivo (Carga inicial con 90% estático)
            SatexPreventivoDesign.render("preventivos-grafico-container", 90);
            
            // Personal y Compras
            SatexPersonalDesign.render("personal-container");
            SatexComprasDesign.render("compras-container", 14, 8);
            
            // Accidentes
            SatexAccidentes.init("accidentes-container");

            // --- CICLO DE ACTUALIZACIÓN AUTOMÁTICA ---
            
            // Ejecución inmediata de la primera carga de datos reales
            await actualizarTablero();

            // Intervalo principal: Cada 15 segundos crece para incluir el Puente de Datos
            setInterval(async () => {
                await actualizarTablero();
            }, 15000);
        };

        async function actualizarTablero() {
            console.log("Actualizando datos del tablero...");

            try {
                // 1. Actualización de Husos y Máquinas (Existente)
                const datosPlanta = await SatexDataLoader.obtenerDatosPrincipales();
                if(datosPlanta) {
                    SatexEstatusData.actualizar(datosPlanta);
                }

                // 2. NUEVA FUNCIÓN: Actualización de Dona Preventivos (D4 de Google Sheets)
                // Esta llamada usa la nueva lib_data_bridge para no saturar el index
                if (typeof SatexDataBridge !== 'undefined') {
                    await SatexDataBridge.updatePreventivo();
                }

                // 3. Actualización de Accidentes (Cada ciclo)
                await SatexAccidentes.refresh();

            } catch (error) {
                console.error("Error en el ciclo de actualización:", error);
            }
        }
    </script>
</body>
</html>
